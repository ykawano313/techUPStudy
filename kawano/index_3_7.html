<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <title>J-4課題</title>

<body>
    <h1>J-4. 条件分岐</h1>

    <script>

        year = 2022;

        switch (year) {
            case 2015:
                year_result = '未';
                break;
            case 2016:
                year_result = '申';
                break;
            case 2017:
                year_result = '酉';
                break;
            case 2018:
                year_result = '戌';
                break;
            case 2019:
                year_result = '亥';
                break;
            case 2020:
                year_result = '子';
                break;
            case 2021:
                year_result = '丑';
                break;
            case 2022:
                year_result = '寅';
                break;
            case 2023:
                year_result = '卯';
                break;
            case 2024:
                year_result = '辰';
                break;
            case 2025:
                year_result = '巳';
                break;
            case 2026:
                year_result = '午';
                break;
            default:
                year_result = 'カワウソ';
        }

        console.log(year_result);

    </script>

</body>

</html>
