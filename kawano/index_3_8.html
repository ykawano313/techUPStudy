<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J-5課題</title>
</head>

<body>
    <h1>J-5. 関数定義</h1>

    <script>

        alert('XXを関数で確認します');

        const xx = 5;

        function num4(xx) {
            if (xx >= 4) {
                console.log('値は4以上です。')
            } else {
                console.log('値は4未満です。')
            }
        }
        num4(xx);

        function num10(xx) {
            if (xx >= 10) {
                console.log('値は10以上です。')
            } else {
                console.log('値は10未満です。')
            }
        }
        num10(xx);

    </script>
</body>

</html>
